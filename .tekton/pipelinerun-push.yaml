# PAC demo - triggers on push to main. References pipeline installed in config/.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: pac-demo-push-
  annotations:
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch == "main"
    pipelinesascode.tekton.dev/pipeline: "config/build-and-push-pipeline.yaml"
spec:
  pipelineRef:
    name: build-and-push-pipeline
  taskRunTemplate:
    serviceAccountName: pipeline
  params:
  - name: git-repo
    value: "{{repo_url}}"
  - name: git-revision
    value: "{{revision}}"
  - name: image_tag
    value: "{{revision}}"
  workspaces:
  - name: source
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
  - name: dockerconfig
    secret:
      secretName: ghcr-creds
  - name: sbom
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Mi
